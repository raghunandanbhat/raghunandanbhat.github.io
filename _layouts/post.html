---
layout: default
---

<article>
  <a href="{{ "/blogs" | prepend: site.baseurl | replace: '//', '/' }}"><h3 class="header-link">~/blog/</h2></a><h2><b>{{ page.title }}</b></h2>
  <time datetime="{{ page.date | date_to_xmlschema }}" class="by-line">{{ page.date | date_to_string }}</time>
  {{ content }}
</article>
